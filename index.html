<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>うどん百名店 MAP 2017-2024 | EAST × WEST 全年度統合版</title>
    <meta name="description" content="食べログ「うどん百名店」2017〜2024年 EAST・WEST全店舗を地図上にプロット。年度別選出履歴、エリア別フィルタ、検索、閉店情報付き。">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Leaflet MarkerCluster CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css?v=3.1">
</head>
<body>
    <!-- ヘッダー -->
    <header id="app-header">
        <div class="header-inner">
            <div class="logo-area logo-home" id="logo-home" role="button" tabindex="0" aria-label="トップに戻る" title="トップに戻る">
                <span class="logo-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="28" height="28"><path d="M15 45 C15 45 18 30 50 30 C82 30 85 45 85 45 L80 48 C80 48 75 36 50 36 C25 36 20 48 20 48 Z" fill="#D4A853"/><path d="M20 48 C20 48 22 75 50 80 C78 75 80 48 80 48 Z" fill="#D4A853"/><path d="M35 42 Q50 32 65 42" stroke="#E8C547" stroke-width="3" fill="none" stroke-linecap="round"/><path d="M30 48 Q45 38 60 48" stroke="#E8C547" stroke-width="3" fill="none" stroke-linecap="round"/><path d="M40 36 Q55 26 70 36" stroke="#E8C547" stroke-width="3" fill="none" stroke-linecap="round"/><path d="M42 80 L38 95 L62 95 L58 80" fill="#D4A853"/></svg></span>
                <h1>うどん百名店 <span class="year-badge">2017-2024</span></h1>
                <span class="subtitle">EAST × WEST MAP</span>
            </div>
            <div class="header-stats" id="header-stats">
                <div class="stat-item">
                    <span class="stat-number" id="stat-total">0</span>
                    <span class="stat-label">全店舗</span>
                </div>
                <div class="stat-item stat-east">
                    <span class="stat-number" id="stat-east">0</span>
                    <span class="stat-label">EAST</span>
                </div>
                <div class="stat-item stat-west">
                    <span class="stat-number" id="stat-west">0</span>
                    <span class="stat-label">WEST</span>
                </div>
            </div>
        </div>
    </header>

    <!-- コントロールパネル -->
    <aside id="control-panel" class="panel-closed">
        <button id="panel-toggle" class="panel-toggle-btn" aria-label="パネル開閉">
            <span class="toggle-icon">◀</span>
            <span class="toggle-label">🔍 検索・フィルタ</span>
        </button>
        
        <div class="panel-content">
            <!-- 検索（常時表示） -->
            <div class="control-section">
                <label class="control-label" for="search-input">🔍 店名検索</label>
                <div class="search-wrapper">
                    <input type="text" id="search-input" class="search-input" placeholder="店名・エリアで検索..." autocomplete="off">
                    <kbd class="search-shortcut">⌘K</kbd>
                </div>
            </div>

            <!-- 絞り込みフィルタ（折りたたみ可能） -->
            <div class="control-section collapsible-section" id="filter-section">
                <button class="section-toggle" aria-expanded="false" aria-controls="filter-body">
                    <span class="section-toggle-label">🎯 絞り込みフィルタ</span>
                    <span class="section-toggle-arrow">▼</span>
                </button>
                <div class="section-body collapsed" id="filter-body">
                    <!-- エリア -->
                    <div class="filter-subsection">
                        <label class="control-label">📍 エリア</label>
                        <div class="filter-group region-filters">
                            <button class="filter-btn active" data-filter="all" aria-pressed="true">ALL</button>
                            <button class="filter-btn east-btn" data-filter="EAST" aria-pressed="false">EAST</button>
                            <button class="filter-btn west-btn" data-filter="WEST" aria-pressed="false">WEST</button>
                        </div>
                    </div>
                    <!-- 都道府県 -->
                    <div class="filter-subsection">
                        <label class="control-label" for="pref-select">🗾 都道府県</label>
                        <select id="pref-select" class="pref-select">
                            <option value="all">すべて</option>
                        </select>
                    </div>
                    <!-- 選出年 -->
                    <div class="filter-subsection">
                        <label class="control-label">📅 選出年</label>
                        <div class="filter-group year-filters">
                            <button class="filter-btn active" data-year="all" aria-pressed="true">全年度</button>
                            <button class="filter-btn year-filter-btn" data-year="2024" aria-pressed="false">2024</button>
                            <button class="filter-btn year-filter-btn" data-year="2022" aria-pressed="false">2022</button>
                            <button class="filter-btn year-filter-btn" data-year="2020" aria-pressed="false">2020</button>
                            <button class="filter-btn year-filter-btn" data-year="2019" aria-pressed="false">2019</button>
                            <button class="filter-btn year-filter-btn" data-year="2018" aria-pressed="false">2018</button>
                            <button class="filter-btn year-filter-btn" data-year="2017" aria-pressed="false">2017</button>
                        </div>
                    </div>
                    <!-- 選出回数 -->
                    <div class="filter-subsection">
                        <label class="control-label">🏆 選出回数</label>
                        <div class="filter-group count-filters">
                            <button class="filter-btn active" data-min-count="0" aria-pressed="true">指定なし</button>
                            <button class="filter-btn" data-min-count="2" aria-pressed="false">2回以上</button>
                            <button class="filter-btn" data-min-count="3" aria-pressed="false">3回以上</button>
                            <button class="filter-btn" data-min-count="4" aria-pressed="false">4回以上</button>
                            <button class="filter-btn" data-min-count="5" aria-pressed="false">5回以上</button>
                            <button class="filter-btn" data-min-count="6" aria-pressed="false">6回以上</button>
                        </div>
                    </div>
                    <!-- 特殊フィルタ -->
                    <div class="filter-subsection">
                        <label class="control-label">⭐ 特殊フィルタ</label>
                        <div class="filter-group special-filters">
                            <button class="filter-btn" id="first-selected-btn" aria-pressed="false">初選出のみ</button>
                            <button class="filter-btn" id="hide-closed-btn" aria-pressed="false">閉店を除外</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 表示件数 & ソート（常時表示） -->
            <div class="control-section results-info">
                <div class="results-header">
                    <div class="results-count" aria-live="polite">
                        表示中: <strong id="visible-count">0</strong> 件
                    </div>
                    <div class="sort-control">
                        <select id="sort-select" class="sort-select">
                            <option value="name">名前順</option>
                            <option value="count-desc">選出回数 ↓</option>
                            <option value="count-asc">選出回数 ↑</option>
                            <option value="pref">都道府県順</option>
                            <option value="distance" disabled>近い順（📍取得後）</option>
                        </select>
                    </div>
                </div>
            </div>
            
            <!-- 店舗リスト -->
            <div class="control-section restaurant-list-section">
                <label class="control-label">📋 店舗リスト</label>
                <div id="restaurant-list" class="restaurant-list"></div>
            </div>
        </div>

        <!-- パネル幅リサイズハンドル（PC用） -->
        <div id="panel-resize-handle" class="panel-resize-handle" title="ドラッグで幅を調整"></div>
    </aside>

    <!-- モバイル用パネル開閉ボタン（パネルの外に配置） -->
    <button id="mobile-panel-toggle" class="mobile-toggle-btn" aria-label="検索・フィルタを開く">
        🔍 検索・フィルタ
    </button>



    <!-- 殿堂入りトグル -->
    <button id="hall-of-fame-btn" class="map-action-btn hall-of-fame-btn" aria-label="殿堂入り（5回以上）だけ表示" aria-pressed="false" title="殿堂入り（5回以上）">
        👑
    </button>

    <!-- 現在地ボタン -->
    <button id="locate-btn" class="locate-btn" aria-label="現在地に移動">
        <svg class="locate-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M3.5 20.5L12 4L20.5 20.5L12 16L3.5 20.5Z" fill="currentColor" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
        </svg>
    </button>

    <!-- 地図 -->
    <main id="map"></main>

    <!-- フッター：免責・出典 -->
    <footer id="app-footer">
        <p class="footer-disclaimer">
            ⚠️ 本サイトは個人制作の非公式ファンツールです。食べログ・株式会社カカクコム・食べログ百名店とは一切の提携・協賛・承認関係にありません。
        </p>
        <p class="footer-disclaimer">
            掲載情報の正確性・最新性は保証しません。来店前に必ず<a href="https://tabelog.com/" target="_blank" rel="noopener noreferrer">食べログ</a>等の公式情報をご確認ください。
        </p>
        <p class="footer-privacy">
            📍 現在地情報はブラウザ上でのみ使用し、サーバーへの送信・保存は一切行いません。
        </p>
        <p class="footer-source">
            地図：<a href="https://maps.gsi.go.jp/development/ichiran.html" target="_blank" rel="noopener noreferrer">国土地理院タイル</a>
            ｜ © <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noopener noreferrer">OpenStreetMap</a> contributors
        </p>
    </footer>

    <!-- フッタートグルボタン -->
    <button id="footer-toggle" class="footer-toggle-btn" aria-label="免責・出典を表示">ℹ️ 免責・出典</button>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Leaflet MarkerCluster JS -->
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    
    <script src="app.js?v=3.1"></script>
</body>
</html>
