<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>うどん百名店 MAP 2017-2024 | EAST × WEST 全年度統合版</title>
    <meta name="description" content="食べログ「うどん百名店」2017〜2024年 EAST・WEST全店舗を地図上にプロット。年度別選出履歴、エリア別フィルタ、検索、閉店情報付き。">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Leaflet MarkerCluster CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- ヘッダー -->
    <header id="app-header">
        <div class="header-inner">
            <div class="logo-area">
                <span class="logo-icon">🍜</span>
                <h1>うどん百名店 <span class="year-badge">2017-2024</span></h1>
                <span class="subtitle">EAST × WEST MAP</span>
            </div>
            <div class="header-stats" id="header-stats">
                <div class="stat-item">
                    <span class="stat-number" id="stat-total">0</span>
                    <span class="stat-label">全店舗</span>
                </div>
                <div class="stat-item stat-east">
                    <span class="stat-number" id="stat-east">0</span>
                    <span class="stat-label">EAST</span>
                </div>
                <div class="stat-item stat-west">
                    <span class="stat-number" id="stat-west">0</span>
                    <span class="stat-label">WEST</span>
                </div>
            </div>
        </div>
    </header>

    <!-- コントロールパネル -->
    <aside id="control-panel" class="panel-closed">
        <button id="panel-toggle" class="panel-toggle-btn" aria-label="パネル開閉">
            <span class="toggle-icon">◀</span>
            <span class="toggle-label">🔍 検索・フィルタ</span>
        </button>
        
        <div class="panel-content">
            <!-- 検索 -->
            <div class="control-section">
                <label class="control-label" for="search-input">🔍 店名検索</label>
                <input type="text" id="search-input" class="search-input" placeholder="店名・エリアで検索..." autocomplete="off">
            </div>

            <!-- リージョンフィルタ -->
            <div class="control-section">
                <label class="control-label">📍 エリア</label>
                <div class="filter-group region-filters">
                    <button class="filter-btn active" data-filter="all">ALL</button>
                    <button class="filter-btn east-btn" data-filter="EAST">EAST</button>
                    <button class="filter-btn west-btn" data-filter="WEST">WEST</button>
                </div>
            </div>

            <!-- 都道府県フィルタ -->
            <div class="control-section">
                <label class="control-label" for="pref-select">🗾 都道府県</label>
                <select id="pref-select" class="pref-select">
                    <option value="all">すべて</option>
                </select>
            </div>

            <!-- 選出年フィルタ -->
            <div class="control-section">
                <label class="control-label">📅 選出年</label>
                <div class="filter-group year-filters">
                    <button class="filter-btn active" data-year="all">全年度</button>
                    <button class="filter-btn year-filter-btn" data-year="2024">2024</button>
                    <button class="filter-btn year-filter-btn" data-year="2022">2022</button>
                    <button class="filter-btn year-filter-btn" data-year="2020">2020</button>
                    <button class="filter-btn year-filter-btn" data-year="2019">2019</button>
                    <button class="filter-btn year-filter-btn" data-year="2018">2018</button>
                    <button class="filter-btn year-filter-btn" data-year="2017">2017</button>
                </div>
            </div>

            <!-- 選出回数フィルタ -->
            <div class="control-section">
                <label class="control-label">🏆 選出回数</label>
                <div class="filter-group count-filters">
                    <button class="filter-btn active" data-min-count="0">指定なし</button>
                    <button class="filter-btn" data-min-count="2">2回以上</button>
                    <button class="filter-btn" data-min-count="3">3回以上</button>
                    <button class="filter-btn" data-min-count="4">4回以上</button>
                    <button class="filter-btn" data-min-count="5">5回以上</button>
                    <button class="filter-btn" data-min-count="6">6回以上</button>
                </div>
            </div>

            <!-- 特殊フィルタ -->
            <div class="control-section">
                <label class="control-label">⭐ 特殊フィルタ</label>
                <div class="filter-group special-filters">
                    <button class="filter-btn" id="first-selected-btn">初選出のみ</button>
                    <button class="filter-btn" id="hide-closed-btn">閉店を除外</button>
                </div>
            </div>

            <!-- 表示件数 & ソート -->
            <div class="control-section results-info">
                <div class="results-header">
                    <div class="results-count">
                        表示中: <strong id="visible-count">0</strong> 件
                    </div>
                    <div class="sort-control">
                        <select id="sort-select" class="sort-select">
                            <option value="name">名前順</option>
                            <option value="count-desc">選出回数 ↓</option>
                            <option value="count-asc">選出回数 ↑</option>
                            <option value="pref">都道府県順</option>
                        </select>
                    </div>
                </div>
            </div>
            
            <!-- 店舗リスト -->
            <div class="control-section restaurant-list-section">
                <label class="control-label">📋 店舗リスト</label>
                <div id="restaurant-list" class="restaurant-list"></div>
            </div>
        </div>
    </aside>

    <!-- モバイル用パネル開閉ボタン（パネルの外に配置） -->
    <button id="mobile-panel-toggle" class="mobile-toggle-btn" aria-label="検索・フィルタを開く">
        🔍 検索・フィルタ
    </button>

    <!-- 現在地ボタン -->
    <button id="locate-btn" class="locate-btn" aria-label="現在地に移動">
        📍
    </button>

    <!-- 地図 -->
    <main id="map"></main>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Leaflet MarkerCluster JS -->
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    
    <script src="app.js"></script>
</body>
</html>
